services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  api:
    build: ./Zubs_BE
    restart: always
    environment:
      ConnectionStrings__ZubsConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      JwtOptions__Key: ${JWT_KEY}
    depends_on:
      - db
      - redis
    ports:
      - "5000:8080"

  frontend:
    build: ./zubs_fe
    restart: always
    volumes:
      - ./zubs_fe/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata: